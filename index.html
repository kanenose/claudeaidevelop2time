<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커뮤니티</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="logo" onclick="goToList()">커뮤니티</span>
      <div class="header-right">
        <span id="user-nickname" class="user-nickname-link" onclick="showOwnProfile()"></span>
        <button id="btn-write"    class="btn btn-primary hidden" onclick="showSection('write')">글쓰기</button>
        <button id="btn-admin"    class="btn icon-btn hidden"   onclick="showSection('admin')" title="관리자">🛡️</button>
        <button id="btn-settings" class="btn icon-btn hidden"   onclick="showSection('settings')" title="설정">⚙️</button>
        <button id="btn-login"    class="btn"                   onclick="showSection('auth')">로그인</button>
        <button id="btn-logout"   class="btn hidden"            onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </header>

  <main>

    <!-- 인증 -->
    <section id="section-auth" class="section hidden">
      <div class="card auth-card">
        <div class="tab-row">
          <button class="tab active" id="tab-login"  onclick="switchTab('login')">로그인</button>
          <button class="tab"        id="tab-signup" onclick="switchTab('signup')">회원가입</button>
        </div>
        <div id="form-login">
          <h2>로그인</h2>
          <input class="input" type="email"    id="login-email"    placeholder="이메일" />
          <input class="input" type="password" id="login-password" placeholder="비밀번호" />
          <button class="btn btn-primary full" onclick="doLogin()">로그인</button>
          <p class="error-msg" id="login-err"></p>
        </div>
        <div id="form-signup" class="hidden">
          <h2>회원가입</h2>
          <input class="input" type="email"    id="signup-email"            placeholder="이메일" />
          <input class="input" type="password" id="signup-password"         placeholder="비밀번호 (6자 이상)" />
          <input class="input" type="password" id="signup-password-confirm" placeholder="비밀번호 확인" />
          <input class="input" type="text"     id="signup-nickname"         placeholder="닉네임 (2자 이상)" />
          <button class="btn btn-primary full" onclick="doSignup()">회원가입</button>
          <p class="error-msg" id="signup-err"></p>
        </div>
      </div>
    </section>

    <!-- 글쓰기 -->
    <section id="section-write" class="section hidden">
      <div class="card">
        <h2>글쓰기</h2>
        <input class="input" type="text" id="post-title" placeholder="제목" />
        <textarea class="input textarea" id="post-content" placeholder="내용을 입력하세요"></textarea>
        <label class="anon-label">
          <input type="checkbox" id="post-anon" />
          <span>익명으로 작성</span>
        </label>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="doCreatePost()">작성</button>
          <button class="btn" onclick="goToList()">취소</button>
        </div>
        <p class="error-msg" id="write-err"></p>
      </div>
    </section>

    <!-- 목록 -->
    <section id="section-list" class="section">
      <div class="sort-bar">
        <button class="sort-btn active" data-sort="latest"   onclick="changeSort(this)">최신순</button>
        <button class="sort-btn"        data-sort="popular"  onclick="changeSort(this)">인기순</button>
        <button class="sort-btn"        data-sort="hot"      onclick="changeSort(this)">화제순</button>
        <button class="sort-btn"        data-sort="likes"    onclick="changeSort(this)">추천순</button>
        <button class="sort-btn"        data-sort="comments" onclick="changeSort(this)">댓글순</button>
      </div>
      <div id="posts-container"></div>
    </section>

    <!-- 상세 -->
    <section id="section-detail" class="section hidden">
      <button class="btn back-btn" onclick="goToList()">← 목록으로</button>
      <div id="post-detail-content" class="card"></div>
      <div class="card comments-area">
        <h3 id="comments-title">댓글</h3>
        <div id="comment-write-area"></div>
        <div id="comments-container"></div>
      </div>
    </section>

    <!-- 프로필 -->
    <section id="section-profile" class="section hidden">
      <button class="btn back-btn" onclick="goToList()">← 목록으로</button>
      <div class="card profile-card">
        <div class="profile-header">
          <div class="profile-avatar" id="profile-avatar"></div>
          <div class="profile-info">
            <h2 id="profile-nickname"></h2>
            <p id="profile-joined" class="profile-joined"></p>
          </div>
        </div>
        <div id="profile-edit-area"></div>
      </div>
      <div class="tab-row profile-tab-row">
        <button class="tab active" id="ptab-posts"    onclick="switchProfileTab('posts')">작성한 글</button>
        <button class="tab"        id="ptab-comments" onclick="switchProfileTab('comments')">작성한 댓글</button>
      </div>
      <div id="profile-posts-area"></div>
      <div id="profile-comments-area" class="hidden"></div>
    </section>

    <!-- 관리자 패널 -->
    <section id="section-admin" class="section hidden">
      <button class="btn back-btn" onclick="goToList()">← 뒤로</button>
      <div class="card">
        <h2>관리자 패널</h2>
        <div class="tab-row admin-tab-row">
          <button class="tab active" id="admin-tab-dashboard"    onclick="switchAdminTab('dashboard')">대시보드</button>
          <button class="tab"        id="admin-tab-users"        onclick="switchAdminTab('users')">사용자 관리</button>
          <button class="tab"        id="admin-tab-posts"        onclick="switchAdminTab('posts')">게시물 관리</button>
          <button class="tab"        id="admin-tab-reports"      onclick="switchAdminTab('reports')">신고 처리</button>
          <button class="tab"        id="admin-tab-banned-words" onclick="switchAdminTab('banned-words')">금지어</button>
          <button class="tab"        id="admin-tab-logs"         onclick="switchAdminTab('logs')">활동 로그</button>
        </div>

        <div id="admin-panel-dashboard">
          <div id="admin-dashboard"></div>
        </div>
        <div id="admin-panel-users" class="hidden">
          <div id="admin-users"></div>
        </div>
        <div id="admin-panel-posts" class="hidden">
          <div id="admin-posts"></div>
        </div>
        <div id="admin-panel-reports" class="hidden">
          <div style="margin-bottom:12px">
            <label style="font-size:14px;color:var(--muted)">필터:
              <select id="admin-report-filter" onchange="renderAdminReports()" style="margin-left:6px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text)">
                <option value="pending">대기중</option>
                <option value="all">전체</option>
              </select>
            </label>
          </div>
          <div id="admin-reports"></div>
        </div>
        <div id="admin-panel-banned-words" class="hidden">
          <div id="admin-banned-words"></div>
        </div>
        <div id="admin-panel-logs" class="hidden">
          <div id="admin-logs"></div>
        </div>
      </div>
    </section>

    <!-- 설정 -->
    <section id="section-settings" class="section hidden">
      <button class="btn back-btn" onclick="goToList()">← 뒤로</button>

      <div class="card">
        <h2>설정</h2>
        <div class="setting-row">
          <div class="setting-label">
            <span class="setting-title">다크 모드</span>
            <span class="setting-desc">어두운 화면으로 전환합니다</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode(this.checked)" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="card">
        <h3 class="settings-group-title">닉네임 변경</h3>
        <div class="nickname-edit-row">
          <input class="input" type="text" id="settings-new-nickname" placeholder="새 닉네임" />
          <button class="btn btn-primary" onclick="doChangeNickname()">변경</button>
        </div>
        <p class="error-msg" id="settings-nickname-msg"></p>
      </div>

      <div class="card">
        <h3 class="settings-group-title">비밀번호 변경</h3>
        <input class="input" type="password" id="settings-current-password"         placeholder="현재 비밀번호" />
        <input class="input" type="password" id="settings-new-password"             placeholder="새 비밀번호 (6자 이상)" />
        <input class="input" type="password" id="settings-new-password-confirm"     placeholder="새 비밀번호 확인" />
        <button class="btn btn-primary" onclick="doChangePassword()">변경</button>
        <p class="error-msg" id="settings-password-msg"></p>
      </div>

      <div class="card danger-zone-card">
        <h3 class="settings-group-title danger-title">회원 탈퇴</h3>
        <p class="setting-desc" style="margin-bottom:16px">탈퇴 시 작성한 모든 게시글과 댓글이 삭제되며 복구할 수 없습니다.</p>
        <input class="input" type="password" id="settings-delete-password" placeholder="비밀번호를 입력해 탈퇴 확인" />
        <button class="btn btn-danger" onclick="doDeleteAccount()">탈퇴하기</button>
        <p class="error-msg" id="settings-delete-msg"></p>
      </div>
    </section>

  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/votes.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
